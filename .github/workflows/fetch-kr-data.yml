name: Fetch KR Market Data

on:
  schedule:
    - cron: '30 0 * * 1-5'  # KST 09:30, 한국 장 개장 30분 후
    - cron: '0 7 * * 1-5'   # KST 16:00, 한국 장 마감 30분 후
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm ci

      - name: Fetch KR market data
        run: cd scripts && node fetch-kr-market.mjs

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git diff --staged --quiet || git commit -m "data: update kr-market $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
