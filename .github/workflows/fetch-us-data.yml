name: Fetch US Market & News

on:
  schedule:
    - cron: '0 21 * * 1-5'  # KST 06:00 (익일), 미국 장 마감 후
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm ci

      - name: Fetch US market data
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: cd scripts && node fetch-us-market.mjs

      - name: Fetch US news
        env:
          FINLIGHT_API_KEY: ${{ secrets.FINLIGHT_API_KEY }}
        run: cd scripts && node fetch-us-news.mjs

      - name: Fetch asset prices
        run: cd scripts && node fetch-assets.mjs

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git diff --staged --quiet || git commit -m "data: update us-market & us-news $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
